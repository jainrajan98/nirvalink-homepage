<nav [class.scrolled]="isScrolled()" [class.hidden]="isHidden()">
  <div class="nav-progress" [style.width.%]="scrollProgress()"></div>

  <div class="nav-container">
    <a class="logo-wordmark" (click)="scrollTo('hero')">Nirvalink</a>

    <ul class="nav-links" [class.active]="mobileMenuOpen()">
      @for (item of navItems; track item.sectionId) {
        <li>
          <a (click)="scrollTo(item.sectionId)"
             [class.active]="activeSection() === item.sectionId">
            {{ item.label }}
          </a>
        </li>
      }
    </ul>

    <button class="hamburger" [class.active]="mobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
