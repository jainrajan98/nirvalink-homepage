<nav [class.scrolled]="isScrolled()">
  <div class="nav-container">
    <a class="logo-wordmark" (click)="scrollTo('hero')">
      Nirvalink
    </a>

    <ul class="nav-links" [class.active]="mobileMenuOpen()">
      @for (item of navItems; track item.sectionId) {
        <li>
          <a (click)="scrollTo(item.sectionId)">{{ item.label }}</a>
        </li>
      }
      <li class="nav-cta">
        <a class="btn-cta" (click)="scrollTo('contact')">
          <span>Get Started</span>
          <svg class="btn-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </li>
    </ul>

    <button class="hamburger" [class.active]="mobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
