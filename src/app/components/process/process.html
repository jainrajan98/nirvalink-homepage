<section id="process" class="section process-section">
  <div class="container">
    <div class="section-header" appScrollAnimation>
      <h2>How We <span class="gradient-text">Work</span></h2>
      <p>A proven process that delivers results on time, every time</p>
    </div>

    <div class="process-timeline" appScrollAnimation>
      @for (step of steps; track step.number; let i = $index; let last = $last) {
        <div class="process-step">
          <div class="step-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="step.icon"/>
            </svg>
          </div>
          <div class="step-content">
            <span class="step-number">Step {{ step.number }}</span>
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
          </div>
          @if (!last) {
            <div class="step-connector"></div>
          }
        </div>
      }
    </div>
  </div>
</section>
