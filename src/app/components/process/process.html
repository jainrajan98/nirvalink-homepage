<section id="process" class="section process-section">
  <div class="container">
    <div class="section-header" appScrollAnimation>
      <span class="section-label">How We Work</span>
      <h2>From idea to <em>launch</em></h2>
      <p>Clear steps, honest timelines, and no surprises.</p>
    </div>

    <div class="steps-grid">
      @for (step of steps; track step.number; let i = $index) {
        <div class="step-card animate-hidden stagger-{{ i + 1 }}" appScrollAnimation>
          <div class="step-num">0{{ step.number }}</div>
          <div class="step-body">
            <div class="step-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="step.icon"/>
              </svg>
            </div>
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
