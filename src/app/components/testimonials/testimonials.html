<section class="section testimonials-section">
  <div class="container">
    <div class="section-header" appScrollAnimation>
      <h2>What Our Clients <span class="gradient-text">Say</span></h2>
      <p>Hear from businesses we've helped transform</p>
    </div>

    <div class="testimonials-grid" appScrollAnimation>
      @for (testimonial of testimonials; track testimonial.authorName) {
        <div class="testimonial-card">
          <div class="quote-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" opacity="0.15">
              <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10H14.017zM0 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151C7.546 6.068 5.983 8.789 5.983 11H10v10H0z"/>
            </svg>
          </div>
          <p class="quote-text">{{ testimonial.quote }}</p>
          <div class="author">
            <div class="author-avatar">{{ testimonial.initials }}</div>
            <div class="author-info">
              <span class="author-name">{{ testimonial.authorName }}</span>
              <span class="author-role">{{ testimonial.authorRole }}, {{ testimonial.company }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
